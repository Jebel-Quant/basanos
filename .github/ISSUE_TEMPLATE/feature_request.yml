name: Feature Request
description: Suggest a new feature or improvement for Basanos
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe your idea in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: e.g. It's difficult to do X because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see, including any API changes or additions.
      placeholder: I'd like a new method / parameter / class that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, references, or examples that support this request.
