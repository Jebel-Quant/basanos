# Workflow: Paper
#
# Purpose: Compile the LaTeX paper (paper/basanos.tex) to a PDF and publish
#          it as a downloadable workflow artifact.
#
# Trigger: On push and pull requests to main/master branches, or whenever
#          files under paper/ change.  Also supports manual dispatch.

name: Paper

on:
  push:
    branches: [ main, master ]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            latexmk

      - name: Compile LaTeX document
        working-directory: paper
        run: |
          latexmk -pdf -interaction=nonstopmode basanos.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: basanos.pdf
          path: paper/basanos.pdf
          retention-days: 30

      - name: Push PDF to paper branch
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin paper 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/paper; then
            git checkout -b paper origin/paper
          else
            git checkout --orphan paper
            git rm -rf --quiet .
          fi
          cp paper/basanos.pdf basanos.pdf
          git add basanos.pdf
          git diff --staged --quiet || git commit -m "Update basanos.pdf [skip ci]"
          git push origin paper
