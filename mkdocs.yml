site_name: basanos
site_description: Correlation-aware portfolio optimization and analytics for Python.
site_url: https://jebel-quant.github.io/basanos/
repo_url: https://github.com/Jebel-Quant/basanos
repo_name: Jebel-Quant/basanos

docs_dir: docs
site_dir: _mkdocs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            members: true
            show_submodules: true

markdown_extensions:
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Notebooks: notebooks.md
  - Reports: reports.md
  - API Reference:
    - Overview: api.md
    - Engine: api/engine.md
    - Configuration: api/config.md
    - Streaming API: api/stream.md
    - Risk Models & Helpers: api/models.md
    - Exceptions: api/exceptions.md
