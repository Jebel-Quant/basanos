[pytest]
testpaths = tests
# Explicitly exclude generated/cache directories so that tools counting test
# files do not accidentally include .venv package tests or build artifacts.
norecursedirs =
    .venv
    .git
    .tox
    .nox
    .hypothesis
    .pytest_cache
    __pycache__
    *.egg-info
    build
    dist
    _tests
    node_modules
# Enable live logs on console
log_cli = true
# Show DEBUG+ messages
log_cli_level = DEBUG
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
# Show extra summary info for skipped/failed tests
addopts = -ra
# Register custom markers
markers =
    stress: marks tests as stress tests (deselect with '-m "not stress"')
    property: marks tests as property-based tests
