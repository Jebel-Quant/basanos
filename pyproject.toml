[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "basanos"
version = "0.2.3"
description = "Correlation-aware portfolio optimization and analytics for Python."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4",
    "plotly>=6.6.0",
    "polars>=1.37.1",
    "pydantic>=2.12.5",
    "scipy>=1.17.0",
]

[project.urls]
Homepage = "https://github.com/jebel-quant/basanos"
Repository = "https://github.com/jebel-quant/basanos"
Issues = "https://github.com/jebel-quant/basanos/issues-cli"


[dependency-groups]
dev = [
    "hypothesis>=6.0.0",
    "marimo",
    "pandas>=2.0",
    "pyarrow>=14.0",
    "ty>=0.0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/basanos"]

[tool.deptry]
# Explicit module name map so deptry doesn't need to inspect installed packages
package_module_name_map = { "numpy" = "numpy", "plotly" = "plotly", "polars" = "polars", "pydantic" = "pydantic", "scipy" = "scipy", "hypothesis" = "hypothesis", "marimo" = "marimo", "pandas" = "pandas", "pyarrow" = "pyarrow", "ty" = "ty" }

[tool.ty.environment]
python-version = "3.12"
